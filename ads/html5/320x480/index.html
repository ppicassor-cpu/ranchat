<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="ad.size" content="width=320,height=480" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RanChat 320x480</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="ad" class="ad" role="button" tabindex="0" aria-label="Open RanChat">

          <span>Video First</span>

          <span>Safe Tools</span>

      </div>
    </div>
